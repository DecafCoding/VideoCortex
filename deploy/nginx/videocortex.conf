# nginx site for Video Cortex — reverse-proxies the Blazor Server app and serves the
# OKF libraries directly from disk. Install to /etc/nginx/sites-available/videocortex
# and symlink into sites-enabled. See deploy/README.md for the full setup.
server {
    listen 80;
    server_name _;  # or your hostname, e.g. videocortex.lan / a Tailscale MagicDNS name

    # --- Optional HTTP basic auth (skip if the server is only reachable over a VPN) ---
    # Create the file with: sudo htpasswd -c /etc/nginx/.videocortex_htpasswd <user>
    # auth_basic "Video Cortex";
    # auth_basic_user_file /etc/nginx/.videocortex_htpasswd;

    # Serve the generated OKF libraries straight from disk. This bypasses the app, so the
    # knowledge library stays browsable even when the app is stopped. Trailing slashes on
    # both the location and the alias are required.
    location /library/ {
        alias /home/videocortex/SecondBrain/;
        index index.html;
        charset utf-8;
    }

    # Everything else is the Blazor Server app. Blazor runs over a persistent SignalR
    # WebSocket, so HTTP/1.1 + Upgrade headers and a long read timeout are required —
    # without them circuits drop and the UI shows the reconnect banner.
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

# For TLS, run: sudo certbot --nginx -d <your-domain>   (public hostname), or terminate
# TLS with Tailscale (`tailscale serve`) / your own certs and keep this vhost on port 80.
